name: Build RMK Split Firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义三个不同的目标：中央接收器、左手、右手
        target: [central, peripheral_left, peripheral_right]
    steps:
      - name: Checkout storage
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Install rmkit
        # 缓存并安装正确的 rmkit 工具
        run: cargo install rmkit

      - name: Generate Rust Project from TOML
        # 根据你的 keyboard.toml 和 vial.json，在当前目录自动生成完整的 Rust 代码和依赖结构
        run: rmkit generate

      - name: Build Firmware
        env:
          # 防止在线编译时因网络多路复用导致报错
          CARGO_HTTP_MULTIPLEXING: false
        # 使用原生 cargo 编译由 rmkit 刚刚生成的 binary 目标
        run: |
          if [ "${{ matrix.target }}" = "central" ]; then
            cargo build --release --target thumbv7em-none-eabihf --bin central
          elif [ "${{ matrix.target }}" = "peripheral_left" ]; then
            cargo build --release --target thumbv7em-none-eabihf --bin peripheral_left
          else
            cargo build --release --target thumbv7em-none-eabihf --bin peripheral_right
          fi

      - name: Prepare Artifacts
        run: |
          mkdir -p output/
          cp target/thumbv7em-none-eabihf/release/*.uf2 output/ 2>/dev/null || true
          cp target/thumbv7em-none-eabihf/release/*.hex output/ 2>/dev/null || true
          cp target/thumbv7em-none-eabihf/release/*.bin output/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANSIC-${{ matrix.target }}-firmware
          path: output/
