name: Build RMK Split Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Install rmk-cli
        run: |
          cargo install rmk-cli --locked || sleep 5 && cargo install rmk-cli --locked

      - name: Build Firmware
        run: |
          rmk-cli keyboard.toml vial.json --output-dir .
          
          cargo rmk build --target thumbv7em-none-eabihf --bin central -p rmk
          cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_left -p rmk
          cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_right -p rmk

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ANSIC-Firmware
          path: target/thumbv7em-none-eabihf/release/*.uf2
