name: Build RMK Split Firmware

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Install rmk-cli
        run: cargo install rmk-cli

      - name: Generate and Build Firmware
        run: |
          # 使用 rmk-cli 根据 keyboard.toml 和 vial.json 生成项目并编译
          rmk-cli keyboard.toml vial.json --output-dir .
          
          # 编译三个目标
          cargo rmk build --target thumbv7em-none-eabihf --bin central
          cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_left
          cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_right

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANSIC-Firmware
          path: |
            target/thumbv7em-none-eabihf/release/*.uf2
            target/thumbv7em-none-eabihf/release/*.hex
