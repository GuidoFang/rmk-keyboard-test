name: Build RMK Split Firmware

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [dongle, left, right]

    steps:
      - name: Checkout storage
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Install rmk-cli
        run: |
          cargo install rmk --locked --features cli

      - name: Build Firmware
        env:
          CARGO_HTTP_MULTIPLEXING: false
        run: |
          case "${{ matrix.target }}" in
            "dongle")
              cargo rmk build --target thumbv7em-none-eabihf --bin central
              ;;
            "left")
              cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_left
              ;;
            "right")
              cargo rmk build --target thumbv7em-none-eabihf --bin peripheral_right
              ;;
          esac

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANSIC-${{ matrix.target }}
          path: |
            target/thumbv7em-none-eabihf/release/*.uf2
            target/thumbv7em-none-eabihf/release/*.hex
