name: Build RMK Split Firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 对应你的三个固件角色
        target: [central, peripheral_left, peripheral_right]
    steps:
      - name: Checkout storage
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Install Tools
        run: |
          cargo install rmkit
          cargo install flip-link

      - name: Build Split Firmware
        env:
          CARGO_HTTP_MULTIPLEXING: false
        # 通过 rmkit 绕过官方 Reusable Workflow 的硬编码文件限制，直接编译单端目标
        run: |
          rmkit build --target thumbv7em-none-eabihf --bin ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANSIC-${{ matrix.target }}-firmware
          path: |
            target/thumbv7em-none-eabihf/release/*.uf2
            target/thumbv7em-none-eabihf/release/*.hex
            target/thumbv7em-none-eabihf/release/*.bin
          if-no-files-found: ignore
